<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinica Vida</title>
    <link rel="stylesheet" href="static/css/style.css" />
  </head>
  <body>
    <header class="main-header">
      <nav class="navbar">
        <!-- Logo of Clinica Vida-->
        <div class="nav-side logo-container">
          <a href="/" class="logo">Clínica Vida</a>
        </div>

        <!-- Navigation Menu -->
        <ul class="nav-links">
          <li class="nav-item">
            <a href="#home" class="nav-link">Home</a>
          </li>
          <li class="nav-item">
            <a href="#services" class="nav-link">Services</a>
          </li>
          <li class="nav-item">
            <a href="#doctors" class="nav-link">Doctors</a>
          </li>
          <li class="nav-item">
            <a href="#contact" class="nav-link">Contact</a>
          </li>
        </ul>

        <!-- language switcher -->
        <div class="nav-side language-switcher">
          <a href="#" class="lang" data-lang="pt">PT</a>
          <span class="lang-divider">|</span>
          <a href="#" class="lang" data-lang="en">EN</a>
        </div>

        <!-- hamburguer menu -->
        <input type="checkbox" id="menu-hamburguer" class="menu-hamburguer" />
        <label for="menu-hamburguer" class="hamburguer">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </label>

        <!-- Menu Mobile in Hamburguer -->
        <div class="nav-mobile">
          <ul class="nav-links-mobile">
            <li><a href="#home" class="nav-link">Home</a></li>
            <li><a href="#services" class="nav-link">Services</a></li>
            <li><a href="#doctors" class="nav-link">Doctors</a></li>
            <li><a href="#contact" class="nav-link">Contact</a></li>
          </ul>
          <div class="language-switcher-mobile">
            <a href="#" class="lang" data-lang="pt">PT</a>
            <span class="lang-divider">|</span>
            <a href="#" class="lang" data-lang="en">EN</a>
          </div>
        </div>
      </nav>
    </header>
  </body>
</html>
